<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>倪海厦中醫 AI 顧問</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #20231f;
      --muted: #687064;
      --line: #d9ded4;
      --paper: #fbfaf4;
      --panel: #ffffff;
      --leaf: #1f6b4a;
      --leaf-dark: #174832;
      --clay: #b86b46;
      --gold: #d7b46a;
      --danger: #9f3f32;
      --shadow: 0 18px 48px rgba(36, 43, 31, 0.12);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: Inter, "Segoe UI", "PingFang TC", "Microsoft JhengHei", "Noto Sans CJK TC", sans-serif;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(31,107,74,.08), transparent 38%),
        radial-gradient(circle at top right, rgba(215,180,106,.22), transparent 34%),
        var(--paper);
    }
    button, textarea { font: inherit; }
    .site {
      min-height: 100%;
      display: grid;
      grid-template-rows: auto 1fr;
    }
    header {
      border-bottom: 1px solid var(--line);
      background: rgba(251, 250, 244, 0.88);
      backdrop-filter: blur(14px);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .topbar {
      max-width: 1180px;
      margin: 0 auto;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }
    .mark {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: white;
      background: var(--leaf);
      font-weight: 800;
    }
    .brand strong {
      display: block;
      font-size: 16px;
      line-height: 1.1;
      white-space: nowrap;
    }
    .brand span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }
    .dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: #3fba72;
      box-shadow: 0 0 0 5px rgba(63,186,114,.14);
    }
    main {
      max-width: 1180px;
      width: 100%;
      margin: 0 auto;
      padding: 24px 20px;
      display: grid;
      grid-template-columns: minmax(260px, 360px) minmax(0, 1fr);
      gap: 20px;
      min-height: 0;
    }
    aside {
      display: grid;
      align-content: start;
      gap: 14px;
    }
    .intro {
      padding: 22px;
      background: var(--leaf-dark);
      color: white;
      border-radius: 8px;
      box-shadow: var(--shadow);
    }
    h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.12;
      letter-spacing: 0;
    }
    .intro p {
      margin: 14px 0 0;
      color: rgba(255,255,255,.78);
      line-height: 1.7;
      font-size: 14px;
    }
    .panel {
      padding: 18px;
      background: rgba(255,255,255,.82);
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    .panel h2 {
      margin: 0 0 12px;
      font-size: 15px;
    }
    .panel p, .panel li {
      color: var(--muted);
      line-height: 1.65;
      font-size: 13px;
    }
    .panel p { margin: 0; }
    .panel ul {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 8px;
    }
    .prompt {
      width: 100%;
      text-align: left;
      border: 1px solid var(--line);
      background: white;
      color: var(--ink);
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      line-height: 1.45;
      transition: border-color .15s, transform .15s;
    }
    .prompt:hover {
      border-color: var(--leaf);
      transform: translateY(-1px);
    }
    .warning {
      border-color: rgba(159,63,50,.25);
      background: #fff8f4;
    }
    .warning h2 { color: var(--danger); }
    .chat {
      min-height: calc(100vh - 116px);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
    }
    .chat-head {
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .chat-head h2 {
      margin: 0;
      font-size: 17px;
    }
    .actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .icon-btn {
      border: 1px solid var(--line);
      background: white;
      color: var(--muted);
      width: 36px;
      height: 36px;
      border-radius: 8px;
      cursor: pointer;
    }
    .icon-btn:hover { color: var(--leaf); border-color: var(--leaf); }
    .messages {
      min-height: 0;
      overflow-y: auto;
      padding: 20px;
      background:
        linear-gradient(rgba(255,255,255,.9), rgba(255,255,255,.9)),
        repeating-linear-gradient(0deg, transparent 0, transparent 27px, rgba(31,107,74,.05) 28px);
    }
    .empty {
      height: 100%;
      min-height: 360px;
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--muted);
      padding: 28px;
    }
    .empty strong {
      display: block;
      color: var(--ink);
      font-size: 20px;
      margin-bottom: 8px;
    }
    .msg {
      display: flex;
      margin: 0 0 14px;
    }
    .msg.user { justify-content: flex-end; }
    .bubble {
      max-width: min(680px, 82%);
      border-radius: 8px;
      padding: 12px 14px;
      line-height: 1.7;
      white-space: pre-wrap;
      font-size: 14px;
      border: 1px solid var(--line);
      background: white;
    }
    .user .bubble {
      color: white;
      background: var(--leaf);
      border-color: var(--leaf);
    }
    .composer {
      padding: 14px;
      border-top: 1px solid var(--line);
      background: #fff;
    }
    .input-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: end;
    }
    textarea {
      width: 100%;
      min-height: 48px;
      max-height: 150px;
      resize: none;
      outline: none;
      padding: 13px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      line-height: 1.55;
      color: var(--ink);
      background: #fff;
    }
    textarea:focus { border-color: var(--leaf); box-shadow: 0 0 0 4px rgba(31,107,74,.09); }
    .send {
      border: 0;
      min-width: 92px;
      height: 48px;
      padding: 0 18px;
      border-radius: 8px;
      color: white;
      background: var(--leaf);
      cursor: pointer;
      font-weight: 700;
    }
    .send:disabled {
      opacity: .55;
      cursor: not-allowed;
    }
    .fineprint {
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }
    @media (max-width: 880px) {
      main {
        grid-template-columns: 1fr;
        padding: 14px;
      }
      aside { order: 2; }
      .chat { min-height: 72vh; }
      .topbar { padding: 12px 14px; }
      .brand span { display: none; }
      h1 { font-size: 24px; }
    }
    @media (max-width: 520px) {
      .status { display: none; }
      .chat-head { align-items: flex-start; }
      .input-row { grid-template-columns: 1fr; }
      .send { width: 100%; }
      .bubble { max-width: 92%; }
    }
  </style>
</head>
<body>
  <div class="site">
    <header>
      <div class="topbar">
        <div class="brand">
          <div class="mark">醫</div>
          <div>
            <strong>倪海厦中醫 AI 顧問</strong>
            <span>本地運行的中醫學習與養生諮詢站</span>
          </div>
        </div>
        <div class="status">
          <span class="dot"></span>
          <span id="model">連線中</span>
        </div>
      </div>
    </header>

    <main>
      <aside>
        <section class="intro">
          <h1>先問診，再辨證。</h1>
          <p>依據倪海厦人紀系列資料整理，用對話方式協助梳理寒熱、二便、睡眠、舌象與主訴。適合學習、日常養生參考與初步整理問題。</p>
        </section>

        <section class="panel">
          <h2>快速開始</h2>
          <ul>
            <li><button class="prompt" data-prompt="我最近失眠，晚上躺很久睡不著，白天沒精神。">失眠、睡不好、白天疲勞</button></li>
            <li><button class="prompt" data-prompt="我胃不舒服，吃一點涼的就脹氣，大便不成形。">胃寒、脹氣、大便不成形</button></li>
            <li><button class="prompt" data-prompt="我手腳冰冷，容易疲勞，平常比較怕冷。">手腳冰冷、怕冷、疲勞</button></li>
            <li><button class="prompt" data-prompt="我想用中醫角度整理自己的體質，請一步步問我。">一步步做體質問診</button></li>
          </ul>
        </section>

        <section class="panel warning">
          <h2>必要邊界</h2>
          <p>本站只供中醫學習與日常養生參考，不構成診斷或治療。胸痛、呼吸困難、持續高燒、出血、劇烈疼痛、孕婦與嬰幼兒問題，直接去正規醫療機構。</p>
        </section>
      </aside>

      <section class="chat" aria-label="AI 問診對話">
        <div class="chat-head">
          <div>
            <h2>線上問診</h2>
            <div class="fineprint" id="connection">本地服務已啟動</div>
          </div>
          <div class="actions">
            <button class="icon-btn" title="清空對話" id="reset">清</button>
          </div>
        </div>
        <div class="messages" id="messages">
          <div class="empty" id="empty">
            <div>
              <strong>描述你的狀況</strong>
              <span>例如：睡眠、胃口、怕冷怕熱、二便、舌苔、多久了。</span>
            </div>
          </div>
        </div>
        <div class="composer">
          <div class="input-row">
            <textarea id="input" rows="1" placeholder="輸入你的症狀或問題，按 Enter 發送，Shift+Enter 換行"></textarea>
            <button class="send" id="send">發送</button>
          </div>
          <div class="fineprint">AI 可能出錯。身體不適請以專業醫師診斷為準。</div>
        </div>
      </section>
    </main>
  </div>

  <script>
    const messages = document.getElementById("messages");
    const empty = document.getElementById("empty");
    const input = document.getElementById("input");
    const send = document.getElementById("send");
    const reset = document.getElementById("reset");
    const model = document.getElementById("model");
    const connection = document.getElementById("connection");
    let sessionId = localStorage.getItem("nihaisha_session") || `sess_${Date.now()}_${Math.random().toString(36).slice(2)}`;
    let history = JSON.parse(localStorage.getItem("nihaisha_history") || "[]");
    let currentController = null;
    localStorage.setItem("nihaisha_session", sessionId);

    function save() {
      localStorage.setItem("nihaisha_history", JSON.stringify(history));
    }

    function addMessage(role, text, persist = true) {
      const emptyNode = document.getElementById("empty");
      if (emptyNode) emptyNode.style.display = "none";
      const row = document.createElement("div");
      row.className = `msg ${role}`;
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = text;
      row.appendChild(bubble);
      messages.appendChild(row);
      messages.scrollTop = messages.scrollHeight;
      if (persist) {
        history.push({ role, text });
        save();
      }
      return bubble;
    }

    function restoreHistory() {
      if (!history.length) return;
      history.forEach(item => addMessage(item.role, item.text, false));
    }

    async function loadStatus() {
      try {
        const res = await fetch("/api/status");
        const data = await res.json();
        model.textContent = `${data.model}${data.search_enabled ? " · 搜索開" : " · 本地模式"}`;
        connection.textContent = data.api_connected ? "服務正常" : "模型未配置";
      } catch {
        model.textContent = "未連線";
        connection.textContent = "服務未啟動";
      }
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;
      if (currentController) {
        currentController.abort();
        currentController = null;
        send.disabled = false;
        send.textContent = "發送";
      }
      input.value = "";
      input.style.height = "auto";
      send.disabled = true;
      send.textContent = "等待";
      addMessage("user", text);
      const bubble = addMessage("assistant", "正在整理問診思路...", false);
      let full = "";
      currentController = new AbortController();

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text, session_id: sessionId }),
          signal: currentController.signal
        });
        if (!res.ok || !res.body) throw new Error(`HTTP ${res.status}`);
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split("\n");
          buffer = lines.pop() || "";
          for (const line of lines) {
            if (!line.startsWith("data: ")) continue;
            const raw = line.slice(6).trim();
            if (!raw || raw === "[DONE]") continue;
            try {
              const data = JSON.parse(raw);
              if (data.token) {
                full += data.token;
                bubble.textContent = full;
                messages.scrollTop = messages.scrollHeight;
              }
            } catch {
              full += raw;
              bubble.textContent = full;
            }
          }
        }
        if (!full) bubble.textContent = "模型沒有返回內容，請重試。";
        history.push({ role: "assistant", text: bubble.textContent });
        save();
      } catch (error) {
        bubble.textContent = error.name === "AbortError" ? "已停止上一輪回應。" : "服務暫時不可用，請稍後重試。";
      } finally {
        currentController = null;
        send.disabled = false;
        send.textContent = "發送";
        input.focus();
      }
    }

    input.addEventListener("input", () => {
      input.style.height = "auto";
      input.style.height = `${Math.min(input.scrollHeight, 150)}px`;
    });
    input.addEventListener("keydown", event => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    });
    send.addEventListener("click", sendMessage);
    reset.addEventListener("click", async () => {
      if (currentController) {
        currentController.abort();
        currentController = null;
      }
      history = [];
      save();
      sessionId = `sess_${Date.now()}_${Math.random().toString(36).slice(2)}`;
      localStorage.setItem("nihaisha_session", sessionId);
      messages.innerHTML = `<div class="empty" id="empty"><div><strong>描述你的狀況</strong><span>例如：睡眠、胃口、怕冷怕熱、二便、舌苔、多久了。</span></div></div>`;
      send.disabled = false;
      send.textContent = "發送";
      try {
        await fetch("/api/command", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ command: "/reset", session_id: sessionId })
        });
      } catch {}
    });
    document.querySelectorAll("[data-prompt]").forEach(button => {
      button.addEventListener("click", () => {
        input.value = button.dataset.prompt;
        input.focus();
      });
    });

    restoreHistory();
    loadStatus();
  </script>
</body>
</html>
